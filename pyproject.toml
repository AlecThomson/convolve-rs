[build-system]
requires = ["maturin>=1.7,<2"]
build-backend = "maturin"

[project]
name = "convolve-rs"
requires-python = ">=3.10"
dependencies = ["numpy"]
dynamic = ["version"]

[project.optional-dependencies]
test = ["pytest", "radio-beam", "astropy"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py310"
# The .pyi stub is generated by pyo3-stub-gen; don't lint generated output.
extend-exclude = ["convolve_rs/_convolve_rs/__init__.pyi"]

[tool.ruff.lint]
extend-select = [
  "ARG",  # flake8-unused-arguments
  "B",    # flake8-bugbear
  "BLE",  # flake8-blind-except
  "C4",   # flake8-comprehensions
  "DTZ",  # flake8-datetimez
  "EM",   # flake8-errmsg
  "EXE",  # flake8-executable
  "FA",   # flake8-future-annotations
  "FLY",  # flynt
  "FURB", # refurb
  "G",    # flake8-logging-format
  "I",    # isort
  "ICN",  # flake8-import-conventions
  "ISC",  # flake8-implicit-str-concat
  "LOG",  # flake8-logging
  "NPY",  # NumPy specific rules
  "PD",   # pandas-vet
  "PERF", # perflint
  "PGH",  # pygrep-hooks
  "PIE",  # flake8-pie
  "PL",   # pylint
  "PT",   # flake8-pytest-style
  "PTH",  # flake8-use-pathlib
  "PYI",  # flake8-pyi
  "Q",    # flake8-quotes
  "RET",  # flake8-return
  "RSE",  # flake8-raise
  "RUF",  # Ruff-specific
  "SIM",  # flake8-simplify
  "SLOT", # flake8-slots
  "T10",  # flake8-debugger
  "T20",  # flake8-print
  "TC",   # flake8-type-checking
  "TRY",  # tryceratops
  "UP",   # pyupgrade
  "YTT",  # flake8-2020
]
ignore = [
  "PLR09",   # Too many <...>
  "PLR2004", # Magic value used in comparison
  "G004",
]

[tool.ruff.lint.per-file-ignores]
# Tests deliberately assert on broad ValueError raised from the Rust layer.
"tests/**" = ["PT011"]

[tool.maturin]
features = ["python"]
module-name = "convolve_rs._convolve_rs"
python-source = "."
